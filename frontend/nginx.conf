server {
    listen 8080;
    server_name localhost;

    # Hide Nginx version
    server_tokens off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Restrict Content-Security-Policy
    # Allow local connections, styles, scripts needed by React/Vite
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # Root directory for static assets
    root /usr/share/nginx/html;
    index index.html;

    # Handle React routing
    location / {
        # Limit allowed methods
        limit_except GET POST HEAD OPTIONS {
            deny all;
        }
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Limit allowed methods
        limit_except GET POST PUT DELETE HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://backend:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable proxy buffering for streaming responses if any
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
